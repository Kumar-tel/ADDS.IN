name: CI - Build, Test, Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Focused only on your actual project directories to prevent duplicate root errors
        package: ['Adds.in', 'app-builder-studio']
    name: Check ${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        # Added flag to bypass strict peer dependency conflicts with Vite
        run: npm ci --legacy-peer-deps
        working-directory: ${{ matrix.package }}

      - name: Build (if present)
        run: npm run build --if-present
        working-directory: ${{ matrix.package }}

      - name: Run tests (if present)
        run: npm run test --if-present
        working-directory: ${{ matrix.package }}

      - name: Run npm audit (fails on moderate+)
        run: npm audit --audit-level=moderate
        working-directory: ${{ matrix.package }}
